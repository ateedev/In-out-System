<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membership LNCCI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
       <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 flex items-center justify-center h-screen font-lao">

    <div class="bg-white p-10 rounded-[2rem] shadow-xl w-full max-w-md border border-slate-100">
        <div class="text-center mb-10">  
            <div class="w-24 h-24 mx-auto mb-4">
             <img src="https://lncci.la/wp-content/uploads/2017/12/logo-LNCCI-1.png" 
              alt="LNCCI" 
             class="w-full h-full object-cover"> </div>
            <h1 class="text-2xl font-bold text-slate-800">In-Out membership</h1>
            <p class="text-slate-400">ລະບົບຈັດການເອກະສານ ພະແນກ ພສຂ</p>
        </div>

        <form onsubmit="authLogin(event)" class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">Username</label>
                <input type="text" name="username" required placeholder="ກະລຸນາປ້ອນຊື່ຜູ້ໃຊ້"
                    class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">Password</label>
                <input type="password" name="password" required placeholder="••••••••"
                    class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
            </div>
            <button type="submit" 
                class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 active:scale-[0.98] transition-all">
                ເຂົ້າສູ່ລະບົບ
            </button>
        </form>
    </div>

    <script src="js/api.js"></script>
    <script src="js/router.js"></script>
</body>
</html>
