<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <title>membership system doc</title>
    <script src="https://cdn.tailwindcss.com"></script>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden">

    <aside class="w-64 bg-slate-900 text-white flex flex-col p-4 shadow-xl">
        <div class="text-2xl font-bold p-4 mb-8 border-b border-slate-700 uppercase tracking-widest">ລະບົບຈັດການເອກະສານຂາເຂົ້າ-ອອກ ພະແນກ ພສຂ</div>
        <nav class="space-y-2 flex-1">
            <button onclick="navigate('dashboard')" class="nav-btn w-full flex items-center p-3 gap-3 rounded-xl hover:bg-indigo-600 transition-all" id="nav-dashboard">
                <i class="fas fa-chart-line"></i> ພາບລວມ
            </button>
            <button onclick="navigate('inbound')" class="nav-btn w-full flex items-center p-3 gap-3 rounded-xl hover:bg-indigo-600 transition-all" id="nav-inbound">
                <i class="fas fa-file-import"></i> ເອກະສານເຂົ້າ
            </button>
            <button onclick="navigate('outbound')" class="nav-btn w-full flex items-center p-3 gap-3 rounded-xl hover:bg-indigo-600 transition-all" id="nav-outbound">
                <i class="fas fa-file-export"></i> ເອກະສານອອກ
            </button>
            <button onclick="navigate('settings')" class="nav-btn w-full flex items-center p-3 gap-3 rounded-xl hover:bg-indigo-800 transition-all" id="nav-settings">
                <i class="fas fa-cog"></i> ຕັ້ງຄ່າ
            </button>
        </nav>
        <div class="mt-auto pt-6 border-t border-slate-800 font-lao">
        <div class="flex items-center justify-between text-[10px] text-slate-500 mb-2">
            <span>VERSION 1.0.0</span>
            <span class="bg-indigo-500/10 text-indigo-500 px-2 py-0.5 rounded-full border border-indigo-500/20">Stable</span>
        </div>
        <div class="text-[11px] text-slate-400">
            <p>© ພະແນກ ພັດທະນາອົງກອນທຸລະກິດ ສະມາຊິກ ແລະ ຂໍ້ມູນຂ່າວສານ</p>
            <p class="text-slate-600 mt-1 uppercase tracking-tighter">Developed by Atee</p>
        </div>
    </div>
    </aside>

    <main class="flex-1 flex flex-col">
        <header class="h-16 bg-white border-b flex items-center justify-between px-8 shadow-sm">
            <h2 id="page-title" class="text-xl font-bold text-slate-700 font-lao">ໜ້າຫຼັກ</h2>
           <div class="flex items-center gap-3">
    <div class="text-right border-r pr-3 border-gray-200">
        <p id="display-user-name" class="font-bold text-indigo-600 leading-none mb-1">ກຳລັງໂຫຼດ...</p>
        <p id="display-user-role" class="text-[10px] text-gray-400 uppercase tracking-widest leading-none">Role</p>
    </div>
    <button onclick="handleLogout()" class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 hover:text-red-500 hover:bg-red-50 transition-all">
        <i class="fas fa-sign-out-alt"></i>
    </button>
</div>
        </header>
        <div id="content-view" class="flex-1 overflow-y-auto p-8">
            </div>
    </main>
    <div id="edit-modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50">
    <div id="modal-body" class="w-full max-w-4xl mx-4">
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/api.js"></script>
    <script src="js/components.js"></script>
    <script src="js/router.js"></script>
